name: Update Notion Status on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Extract Notion page ID from linked issue
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"

          # Extract issue number from PR body (e.g., "Closes #123", "Fixes #123", "#123")
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?<=#)\d+' | head -1 || echo "")

          if [ -z "$ISSUE_NUM" ]; then
            echo "No linked issue found in PR body"
            exit 0
          fi

          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          NOTION_ID=$(echo "$ISSUE_BODY" | grep -oP '(?<=notion-id:)[a-f0-9-]+' || echo "")

          if [ -z "$NOTION_ID" ]; then
            echo "No Notion page ID found in issue #$ISSUE_NUM"
            exit 0
          fi

          echo "notion_id=$NOTION_ID" >> "$GITHUB_OUTPUT"
          echo "Found Notion page ID: $NOTION_ID from issue #$ISSUE_NUM"

      - name: Update Notion status to Done
        if: steps.extract.outputs.notion_id != ''
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          curl -s -X PATCH \
            "https://api.notion.com/v1/pages/${{ steps.extract.outputs.notion_id }}" \
            -H "Authorization: Bearer ${NOTION_API_KEY}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{
              "properties": {
                "State": {
                  "status": {
                    "name": "Done"
                  }
                }
              }
            }'
          echo "Updated Notion page status to Done"
