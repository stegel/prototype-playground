name: Claude Feature Builder

on:
  repository_dispatch:
    types: [feature-requested]

jobs:
  build-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Claude builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/claude_builder.py \
            --description "${{ github.event.client_payload.feature_description }}" \
            --notes "${{ github.event.client_payload.feature_notes }}" \
            --notion-id "${{ github.event.client_payload.notion_page_id }}"

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ github.event.client_payload.branch_name }}
          base: main
          title: "feat: ${{ github.event.client_payload.feature_description }}"
          commit-message: "feat: ${{ github.event.client_payload.feature_description }}"
          body: |
            **Notion feature:** ${{ github.event.client_payload.notion_page_id }}
            **Auto-generated by Claude**

      - name: Update Notion → Review
        if: steps.pr.outputs.pull-request-url != ''
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          curl -s -X PATCH \
            "https://api.notion.com/v1/pages/${{ github.event.client_payload.notion_page_id }}" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "properties": {
                "State": { "status": { "name": "Review" } },
                "PR URL": { "url": "${{ steps.pr.outputs.pull-request-url }}" }
              }
            }'