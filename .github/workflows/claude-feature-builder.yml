name: Claude Feature Builder

on:
  repository_dispatch:
    types: [feature-requested]

jobs:
  build-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Create feature branch
        run: |
          git checkout -b ${{ github.event.client_payload.branch_name }}
      - name: Check API key is set
        run: |
            if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is not set"
            else
            echo "API key is set, starts with: ${ANTHROPIC_API_KEY:0:15}"
            fi
        env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run Claude builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/claude_builder.py \
            --description "${{ github.event.client_payload.feature_description }}" \
            --notion-id "${{ github.event.client_payload.notion_page_id }}"

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "Claude Feature Builder"
          git add -A
          git commit -m "feat: ${{ github.event.client_payload.feature_description }}"
          git push origin ${{ github.event.client_payload.branch_name }}

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ github.event.client_payload.branch_name }}
          base: main
          title: "feat: ${{ github.event.client_payload.feature_description }}"
          body: |
            **Notion feature:** ${{ github.event.client_payload.notion_page_id }}
            **Auto-generated by Claude**

      - name: Update Notion → Review
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          curl -s -X PATCH \
            "https://api.notion.com/v1/pages/${{ github.event.client_payload.notion_page_id }}" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "properties": {
                "Status": { "select": { "name": "Review" } },
                "PR URL": { "url": "${{ steps.pr.outputs.pull-request-url }}" }
              }
            }'

  mark-done:
    # Separate job triggered when PR is merged
    # Uses: github.event.pull_request.merged == true
    # Wire this up as a separate workflow on pull_request closed event
    runs-on: ubuntu-latest
    if: false  # placeholder — see note below
    steps:
      - run: echo "See pr-merged.yml"