name: Claude Auto-Implement Feature

on:
  issues:
    types: [opened, labeled]

jobs:
  implement:
    if: contains(github.event.issue.labels.*.name, 'auto-implement')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract metadata from issue
        id: extract
        run: |
          BODY=$(gh issue view ${{ github.event.issue.number }} --json body --jq '.body')
          NOTION_ID=$(echo "$BODY" | grep -oP '(?<=notion-id:)[a-f0-9-]+' || echo "")
          PRIORITY=$(echo "$BODY" | grep -oP '(?<=\*\*Priority:\*\* )\w+' || echo "Medium")
          echo "notion_id=$NOTION_ID" >> "$GITHUB_OUTPUT"
          echo "priority=$PRIORITY" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Implement feature with Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Implement the following feature for the Prototype Playground project.

            ISSUE: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            PRIORITY: ${{ steps.extract.outputs.priority }}

            FEATURE DESCRIPTION (from the issue body):
            ${{ github.event.issue.body }}

            INSTRUCTIONS:
            1. Read CLAUDE.md for project conventions and structure.
            2. Implement this feature following existing patterns.
            3. If this is a new prototype, create it under src/prototypes/ with:
               - A designer folder (use "claude-bot" if no designer specified)
               - A prototype folder with meta.json and page.tsx
            4. Use shared UI components from @/components/ui.
            5. Use theme tokens from globals.css (never raw colors).
            6. Make the prototype interactive and functional, not a stub.
            7. Run `npm run build` to verify no errors.

      - name: Update Notion status to Review
        if: success() && steps.extract.outputs.notion_id != ''
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          curl -s -X PATCH \
            "https://api.notion.com/v1/pages/${{ steps.extract.outputs.notion_id }}" \
            -H "Authorization: Bearer ${NOTION_API_KEY}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{
              "properties": {
                "State": {
                  "status": {
                    "name": "Review"
                  }
                }
              }
            }'
          echo "Updated Notion status to Review"

      - name: Comment on issue with result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --body "Claude has finished implementing this feature. A PR has been created for review."
          else
            gh issue comment ${{ github.event.issue.number }} \
              --body "Claude encountered an error while implementing this feature. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
